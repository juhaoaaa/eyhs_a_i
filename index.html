<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 비전: 실시간 사물 인식기</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        /* 🌌 애니메이션이 적용된 미래지향적 다크 백그라운드 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f051d 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* ✨ 네온 그라데이션 타이틀 */
        h1 {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #00f2fe, #4facfe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            letter-spacing: 1px;
        }

        p {
            font-size: 0.95rem;
            color: #a5b4fc;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* 🔮 투명 유리 느낌의 글래스모피즘 상태 창 */
        #status {
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        /* ⚡ 가동 중일 때 뿜어져 나오는 네온 글로우 효과 */
        .status-active {
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4) !important;
            border: 1px solid rgba(0, 242, 254, 0.5) !important;
        }

        /* 🖼️ 사이버 펑크 스타일의 메인 모니터 프레임 */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 540px;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            /* 테두리 네온 하이라이트 */
            border: 2px solid rgba(79, 172, 254, 0.4);
            box-shadow: 
                0 0 30px rgba(0, 242, 254, 0.15),
                0 20px 40px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(0, 242, 254, 0.2);
        }

        /* 비디오 원본은 숨김 */
        video { display: none; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 장식용 SF 그리드 디자인 요소 (코너 오버레이) */
        #canvas-container::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; width: 15px; height: 15px;
            border-top: 3px solid #00f2fe; border-left: 3px solid #00f2fe;
            z-index: 10; pointer-events: none;
        }
        #canvas-container::after {
            content: '';
            position: absolute;
            bottom: 15px; right: 15px; width: 15px; height: 15px;
            border-bottom: 3px solid #ff007f; border-right: 3px solid #ff007f;
            z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>📸 AI VISION DETECTOR</h1>
    <p>Real-time Object Recognition</p>

    <div id="status">🤖 모델 로딩 중... (약 14MB)</div>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="display_canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('display_canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        let session;
        const modelWidth = 640;
        const modelHeight = 640;

        const labels = ["person", "bicycle", "car", "motorcycle", "airplane", "bus", "train", "truck", "boat", "traffic light", "fire hydrant", "stop sign", "parking meter", "bench", "bird", "cat", "dog", "horse", "sheep", "cow", "elephant", "bear", "zebra", "giraffe", "backpack", "umbrella", "handbag", "tie", "suitcase", "frisbee", "skis", "snowboard", "sports ball", "kite", "baseball bat", "baseball glove", "skateboard", "surfboard", "tennis racket", "bottle", "wine glass", "cup", "fork", "knife", "spoon", "bowl", "banana", "apple", "sandwich", "orange", "broccoli", "carrot", "hot dog", "pizza", "donut", "cake", "chair", "couch", "potted plant", "bed", "dining table", "toilet", "tv", "laptop", "mouse", "remote", "keyboard", "cell phone", "microwave", "oven", "toaster", "sink", "refrigerator", "book", "clock", "vase", "scissors", "teddy bear", "hair drier", "toothbrush"];

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();

                statusDiv.innerText = "⚡ 그래픽 가속 장치 최적화 중...";
                session = await ort.InferenceSession.create('yolov8n.onnx', { executionProviders: ['webgl', 'wasm'] });

                statusDiv.innerText = "🎯 SYSTEM ONLINE: 사물을 탐지하는 중";
                statusDiv.style.color = "#00f2fe";
                statusDiv.classList.add('status-active');

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                requestAnimationFrame(processFrame);
            } catch (err) {
                statusDiv.innerText = "❌ 오류: 카메라 권한을 허용해 주세요.";
                statusDiv.style.color = "#ff4a5a";
                statusDiv.style.borderColor = "#ff4a5a";
                console.error(err);
            }
        }

        async function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const inputTensor = preprocess(video, modelWidth, modelHeight);

                if (inputTensor) {
                    try {
                        const outputs = await session.run({ images: inputTensor });
                        const output = outputs[Object.keys(outputs)[0]];
                        postprocess(output.data, output.dims);
                    } catch (e) {
                        console.error(e);
                    }
                }
            }
            requestAnimationFrame(processFrame);
        }

        function preprocess(img, width, height) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0, width, height);

            const imgData = tempCtx.getImageData(0, 0, width, height);
            const data = imgData.data;

            const r = new Float32Array(width * height);
            const g = new Float32Array(width * height);
            const b = new Float32Array(width * height);

            for (let i = 0; i < data.length / 4; i++) {
                r[i] = data[i * 4] / 255.0;
                g[i] = data[i * 4 + 1] / 255.0;
                b[i] = data[i * 4 + 2] / 255.0;
            }

            const float32Data = new Float32Array(width * height * 3);
            float32Data.set(r, 0);
            float32Data.set(g, width * height);
            float32Data.set(b, width * height * 2);

            return new ort.Tensor('float32', float32Data, [1, 3, width, height]);
        }

        function postprocess(data, dims) {
            const numAttributes = dims[1];
            const numBoxes = dims[2];

            for (let i = 0; i < numBoxes; i += 12) {
                let maxScore = 0;
                let classId = -1;

                for (let c = 4; c < numAttributes; c++) {
                    const score = data[c * numBoxes + i];
                    if (score > maxScore) {
                        maxScore = score;
                        classId = c - 4;
                    }
                }

                if (maxScore > 0.45) {
                    const cx = data[0 * numBoxes + i] / modelWidth * canvas.width;
                    const cy = data[1 * numBoxes + i] / modelHeight * canvas.height;
                    const w = data[2 * numBoxes + i] / modelWidth * canvas.width;
                    const h = data[3 * numBoxes + i] / modelHeight * canvas.height;

                    const x = cx - w / 2;
                    const y = cy - h / 2;

                    // 🎨 탐지 사각형 디자인 변경 (네온 시안 컬러로 더 힙하게)
                    ctx.strokeStyle = "#00f2fe";
                    ctx.lineWidth = 3;
                    ctx.shadowColor = "#00f2fe";
                    ctx.shadowBlur = 10; // 사각형에 은은한 빛 반사 효과 추가
                    ctx.strokeRect(x, y, w, h);
                    
                    // 그림자 효과 초기화 (다음 드로잉에 영향 없도록)
                    ctx.shadowBlur = 0;

                    // 🏷️ 라벨 태그 디자인 변경
                    ctx.fillStyle = "#00f2fe";
                    const text = `${labels[classId].toUpperCase()} ${Math.round(maxScore * 100)}%`;
                    ctx.font = "bold 12px 'Orbitron', sans-serif";
                    const textWidth = ctx.measureText(text).width;
                    
                    // 태그 배경박스 (둥근 모서리 살짝)
                    ctx.beginPath();
                    ctx.roundRect(x - 1, y - 24, textWidth + 14, 22, [4, 4, 0, 0]);
                    ctx.fill();

                    // 글자색은 가독성을 위해 어두운 톤으로 매칭
                    ctx.fillStyle = "#090514";
                    ctx.fillText(text, x + 6, y - 8);
                }
            }
        }

        window.onload = startApp;
    </script>
</body>
</html>
